name: CI

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate shell wrapper syntax
        run: |
          bash -n bin/cursor-agent-proxy
          bash -n scripts/install-local
          bash -n scripts/uninstall-local

      - name: Verify wrapper forwards arguments
        run: |
          output="$(
            CURSOR_AGENT_PROXY=http://proxy.example:8080 \
            CURSOR_AGENT_BIN=echo \
            ./bin/cursor-agent-proxy smoke-test
          )"
          test "$output" = "smoke-test"

      - name: Verify latest version auto-discovery
        run: |
          versions_dir="$(mktemp -d)"
          mkdir -p "$versions_dir/2026.01.01-old" "$versions_dir/2026.02.01-new"
          printf '#!/usr/bin/env bash\necho old "$@"\n' >"$versions_dir/2026.01.01-old/cursor-agent"
          printf '#!/usr/bin/env bash\necho new "$@"\n' >"$versions_dir/2026.02.01-new/cursor-agent"
          chmod +x "$versions_dir/2026.01.01-old/cursor-agent" "$versions_dir/2026.02.01-new/cursor-agent"
          output="$(
            CURSOR_AGENT_PROXY=http://proxy.example:8080 \
            CURSOR_AGENT_VERSIONS_DIR="$versions_dir" \
            ./bin/cursor-agent-proxy smoke-test
          )"
          test "$output" = "new smoke-test"

      - name: Verify HTTP/2 patch preload
        run: |
          node --import ./lib/cursor_http2_proxy_patch.mjs \
            -e "import http2 from 'node:http2'; if (typeof http2.connect !== 'function') process.exit(1)"
